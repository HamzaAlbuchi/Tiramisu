# GitLab CI/CD pipeline for Tiramisu (Hello World Island simulation)
# Java 8, Maven, Spring Boot

stages:
  - build
  - test
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"

cache:
  key: ${CI_COMMIT_REF_SLUG}-maven
  paths:
    - .m2/repository

default:
  image: maven:3.8-eclipse-temurin-8

build:
  stage: build
  script:
    - chmod +x mvnw
    - ./mvnw $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour

test:
  stage: test
  script:
    - chmod +x mvnw
    - ./mvnw $MAVEN_CLI_OPTS test
  dependencies:
    - build

deploy:
  stage: deploy
  environment: production
  script:
    - echo "Deploying application..."
    - echo "JAR built in build stage: target/demo-*.jar"
    - echo "Configure your deployment (e.g. Kubernetes, Docker, or GitLab Pages) here."
  when: manual
