# Server: use PORT from environment (Railway, Heroku, etc.) or default 8080
server.port=${PORT:8080}
# Listen on all interfaces so the platform proxy can reach the app
server.address=0.0.0.0

# CORS: comma-separated origins. Override on Railway via APP_CORS_ORIGINS (include your SPA URL).
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Parse Railway DATABASE_URL into Spring format
spring.datasource.url=${DATABASE_URL:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
# Avoid failing startup if DB is temporarily unreachable (Hibernate metadata fetch).
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

gemini.api.key=${GEMINI_API_KEY:placeholder}
# Model id for generateContent. gemini-1.5-flash is NOT valid on v1beta anymore — use e.g. gemini-2.5-flash or gemini-flash-latest.
# List available: GET https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY
gemini.model.id=${GEMINI_MODEL_ID:gemini-2.5-flash}
# Output caps (500 was too low — truncated debate replies and broke judge JSON parsing).
gemini.max-output-tokens-debate=${GEMINI_MAX_OUTPUT_TOKENS_DEBATE:2048}
gemini.max-output-tokens-judge=${GEMINI_MAX_OUTPUT_TOKENS_JUDGE:8192}
