# Server: use PORT from environment (Railway, Heroku, etc.) or default 8080
server.port=${PORT:8080}
# Listen on all interfaces so the platform proxy can reach the app
server.address=0.0.0.0

# CORS for SPA (Vite default 5173). Comma-separated origins.
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
