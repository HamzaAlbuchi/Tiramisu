# Server: use PORT from environment (Railway, Heroku, etc.) or default 8080
server.port=${PORT:8080}
# Listen on all interfaces so the platform proxy can reach the app
server.address=0.0.0.0

# CORS: comma-separated origins. Override on Railway via APP_CORS_ORIGINS (include your SPA URL).
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

gemini.api.key=${GEMINI_API_KEY:placeholder}
